<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Jian Portfolio</title>
 </head>
 <body>
  <!-- Header -->
  <section class="w-full h-screen bg-[#f6c71f]">
   <div class="container flex flex-col h-full">
    <!-- Navbar -->
    <div class="flex flex-row justify-between pt-4">
     <span class="font-bold hover:cursor-pointer">JN</span>
     <img class="w-[24px] h-[24px]" src="./img/menu.svg">
    </div>
    <!-- End Navbar -->

    <!-- Intoduction -->
    <div class="flex grow flex-row p-[20px] overflow-hidden">
        <div class="flex flex-col w-1/2 justify-center">
            <p class="font-bold leading-[25px] md:leading-[50px] text-[24px] md:text-[48px]">Yo! I'm Jian,<br>
               I code Website.
            </p>
            <p class="font-thin pt-4">Lets see my project.</p>
            <!-- Button -->
            <div class="flex flex-col md:flex-row w-4/6 mt-[40px]">
                <button class="w-full md:w-2/6 py-[5px] bg-neutral-800 text-white rounded-full mr-[40px]">Lets See</button>
                <button class="w-full md:w-2/6 py-[5px] border-2 border-neutral-800 rounded-full mt-[40px] md:mt-[0px]">Contact Me</button>
            </div>
            <!-- End Button -->

            <!-- Sosial Media -->
            <div class="grid grid-cols-3 w-4/6 md:w-2/6 mt-[20px] p-4">
                <img class="w-[20px] h-[20px]" src="./img/instagram.png">
                <img class="w-[20px] h-[20px]" src="./img/facebook.png">
                <img class="w-[20px] h-[20px]" src="./img/github.png">
            </div>
            <!-- End Sosial Media -->
        </div>
        
        <div class="w-1/2">
            <img class="w-[640px] h-[640px] scale-x-[-1]" src="./img/peep.svg">
        </div>
    </div>
    <!-- End Intoduction -->
   </div>
  </section>
  <!-- End Header -->
  <!-- Portfolio -->
  <!-- Contact -->
  <!-- Footer -->
 </body>
</html>
